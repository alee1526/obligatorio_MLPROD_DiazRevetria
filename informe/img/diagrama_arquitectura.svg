<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="fl" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5b6470"/>
    </marker>
  </defs>

  <!-- rama imagen -->
  <rect x="16" y="24" width="150" height="104" rx="3" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="91" y="50" text-anchor="middle" font-size="13" fill="#1f3a5f" font-weight="bold">Imagen clínica</text>
  <text x="91" y="72" text-anchor="middle" font-size="11.5" fill="#3d4753">224 × 224 × 3</text>
  <text x="91" y="92" text-anchor="middle" font-size="11" fill="#5b6470">foto de smartphone</text>
  <text x="91" y="110" text-anchor="middle" font-size="11" fill="#5b6470">redimensionada</text>

  <rect x="212" y="24" width="182" height="104" rx="3" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="303" y="48" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">EfficientNet-B2</text>
  <text x="303" y="68" text-anchor="middle" font-size="11" fill="#3d4753">preentrenada en ImageNet</text>
  <text x="303" y="88" text-anchor="middle" font-size="11" fill="#3d4753">últimos 2 bloques entrenables</text>
  <text x="303" y="108" text-anchor="middle" font-size="11" fill="#5b6470">resto congelado</text>

  <!-- rama tabular -->
  <rect x="16" y="204" width="150" height="104" rx="3" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="91" y="230" text-anchor="middle" font-size="13" fill="#1f3a5f" font-weight="bold">Ficha clínica</text>
  <text x="91" y="252" text-anchor="middle" font-size="11.5" fill="#3d4753">21 variables</text>
  <text x="91" y="272" text-anchor="middle" font-size="11" fill="#5b6470">edad, región, síntomas,</text>
  <text x="91" y="290" text-anchor="middle" font-size="11" fill="#5b6470">antecedentes</text>

  <rect x="212" y="204" width="182" height="104" rx="3" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="303" y="228" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">Preprocesamiento</text>
  <text x="303" y="248" text-anchor="middle" font-size="11" fill="#3d4753">imputación + indicadores</text>
  <text x="303" y="266" text-anchor="middle" font-size="11" fill="#3d4753">escalado + one-hot</text>
  <text x="303" y="290" text-anchor="middle" font-size="11.5" fill="#9b2226">87 columnas</text>

  <rect x="440" y="204" width="126" height="104" rx="3" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="503" y="240" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">MLP tabular</text>
  <text x="503" y="262" text-anchor="middle" font-size="11" fill="#3d4753">87 → 64 → 64</text>
  <text x="503" y="282" text-anchor="middle" font-size="11" fill="#5b6470">ReLU</text>

  <!-- fusion -->
  <rect x="612" y="114" width="118" height="104" rx="3" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="671" y="148" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">Fusión</text>
  <text x="671" y="170" text-anchor="middle" font-size="11" fill="#3d4753">concatenación</text>
  <text x="671" y="190" text-anchor="middle" font-size="11" fill="#3d4753">→ 128 → dropout</text>

  <rect x="770" y="114" width="94" height="104" rx="3" fill="#1f3a5f"/>
  <text x="817" y="150" text-anchor="middle" font-size="12.5" fill="#ffffff" font-weight="bold">6 clases</text>
  <text x="817" y="172" text-anchor="middle" font-size="10.5" fill="#c8d4e3">ACK BCC MEL</text>
  <text x="817" y="188" text-anchor="middle" font-size="10.5" fill="#c8d4e3">NEV SCC SEK</text>

  <!-- flechas -->
  <line x1="166" y1="76" x2="205" y2="76" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>
  <line x1="394" y1="76" x2="605" y2="140" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>
  <line x1="166" y1="256" x2="205" y2="256" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>
  <line x1="394" y1="256" x2="433" y2="256" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>
  <line x1="566" y1="256" x2="605" y2="192" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>
  <line x1="730" y1="166" x2="763" y2="166" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl)"/>

  <text x="500" y="100" text-anchor="middle" font-size="10.5" fill="#9b2226" font-style="italic">1408 features</text>
  <text x="600" y="240" text-anchor="middle" font-size="10.5" fill="#9b2226" font-style="italic">64 features</text>
</svg>
