<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="fl2" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5b6470"/>
    </marker>
  </defs>

  <!-- usuario -->
  <rect x="14" y="118" width="118" height="80" rx="3" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="73" y="150" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">Navegador</text>
  <text x="73" y="172" text-anchor="middle" font-size="11" fill="#5b6470">del usuario</text>

  <!-- EC2 -->
  <rect x="186" y="26" width="500" height="278" rx="4" fill="none" stroke="#1f3a5f" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="200" y="48" font-size="12" fill="#1f3a5f" font-weight="bold">Instancia EC2 · t3.medium · Amazon Linux 2023 · us-east-1</text>
  <text x="200" y="66" font-size="10.5" fill="#5b6470">AWS Academy Learner Lab · sin GPU · sin roles IAM propios</text>

  <!-- red docker -->
  <rect x="204" y="84" width="464" height="200" rx="3" fill="#f7f9fb" stroke="#b0b7c0" stroke-width="1"/>
  <text x="218" y="104" font-size="11" fill="#5b6470" font-style="italic">red interna de Docker Compose</text>

  <!-- UI -->
  <rect x="224" y="120" width="180" height="142" rx="3" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="314" y="146" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">Contenedor UI</text>
  <text x="314" y="168" text-anchor="middle" font-size="11" fill="#3d4753">Streamlit</text>
  <text x="314" y="190" text-anchor="middle" font-size="11.5" fill="#9b2226" font-weight="bold">publicado en :8501</text>
  <text x="314" y="214" text-anchor="middle" font-size="10.5" fill="#5b6470">monta ./data en solo lectura</text>
  <text x="314" y="238" text-anchor="middle" font-size="10.5" fill="#5b6470">imagen ~2 GB</text>

  <!-- API -->
  <rect x="468" y="120" width="180" height="142" rx="3" fill="#ffffff" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="558" y="146" text-anchor="middle" font-size="12.5" fill="#1f3a5f" font-weight="bold">Contenedor API</text>
  <text x="558" y="168" text-anchor="middle" font-size="11" fill="#3d4753">FastAPI + Uvicorn</text>
  <text x="558" y="190" text-anchor="middle" font-size="11.5" fill="#2e5d34" font-weight="bold">expuesto solo internamente</text>
  <text x="558" y="214" text-anchor="middle" font-size="10.5" fill="#5b6470">model.pt + transformer</text>
  <text x="558" y="238" text-anchor="middle" font-size="10.5" fill="#5b6470">torch CPU · healthcheck</text>

  <!-- flechas -->
  <line x1="132" y1="158" x2="217" y2="158" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl2)"/>
  <text x="174" y="150" text-anchor="middle" font-size="10" fill="#5b6470">HTTP</text>
  <text x="174" y="176" text-anchor="middle" font-size="9.5" fill="#5b6470">:8501</text>

  <line x1="404" y1="180" x2="461" y2="180" stroke="#5b6470" stroke-width="1.4" marker-end="url(#fl2)"/>
  <text x="432" y="172" text-anchor="middle" font-size="9.5" fill="#5b6470">api:8000</text>

  <!-- security group -->
  <rect x="706" y="118" width="158" height="90" rx="3" fill="#eef2f7" stroke="#1f3a5f" stroke-width="1.2"/>
  <text x="785" y="142" text-anchor="middle" font-size="12" fill="#1f3a5f" font-weight="bold">Security Group</text>
  <text x="785" y="164" text-anchor="middle" font-size="10.5" fill="#3d4753">TCP 8501 abierto</text>
  <text x="785" y="182" text-anchor="middle" font-size="10.5" fill="#3d4753">SSH 22 solo mi IP</text>
  <text x="785" y="200" text-anchor="middle" font-size="10.5" fill="#9b2226">puerto 8000 cerrado</text>
</svg>
