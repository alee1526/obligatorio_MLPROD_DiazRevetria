architecture: multimodal
backbone: efficientnet_b2
unfreeze_blocks: 2   # 0 = backbone congelado, N = últimos N bloques entrenables, -1 = todo

epochs: 100
batch_size: 32
lr: 0.0025424040471184574
weight_decay: 0.00003270430413215419
seed: 42

# dimensiones de las ramas (trial 56 de optuna/20260713-102150, val macro-F1 0.784)
dropout: 0.4983217515498858
tab_hidden: 64
tab_out: 64
fusion_hidden: 128

# pérdida: weighted_ce | focal
loss: weighted_ce
focal_gamma: 1.8968092141787

# scheduler: baja el LR cuando val se estanca (pasos más chicos)
lr_factor: 0.5     # multiplica el LR por esto al estancarse
lr_patience: 2     # épocas sin mejora antes de bajar el LR
min_lr: 0.000001

# early stopping (épocas sin mejora antes de cortar; > lr_patience)
patience: 10

# data augmentation (solo en train)
aug_rotation: 21     # grados de rotación
aug_translate: 0.05  # traslación máxima (fracción)
aug_scale: 0.1       # zoom +/- (fracción)
aug_color: 0.03597604802810393  # brillo/contraste/saturación
aug_erase: 0.1662032563120531   # prob. de RandomErasing (0 = off)

# optuna
n_trials: 100
