services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: skin-lesion-api:dev
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=dev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    image: skin-lesion-ui:dev
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
